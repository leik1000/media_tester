<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 媒体测试工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': {
                                'background-size': '200% 200%',
                                'background-position': 'left center'
                            },
                            '50%': {
                                'background-size': '200% 200%',
                                'background-position': 'right center'
                            },
                        },
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            min-height: 100%;
        }
        body {
            background: linear-gradient(-45deg, #0f172a, #020617, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradient-x 15s ease infinite;
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            border-radius: 0.5rem;
            padding: 0.5rem 0.65rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="font-sans">
    <main class="flex min-h-screen items-center justify-center p-6">
        <form id="loginForm" class="glass-panel w-full max-w-md space-y-5 rounded-2xl p-7 shadow-[0_30px_90px_rgba(0,0,0,0.45)]">
            <div class="text-center">
                <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl border border-indigo-300/20 bg-indigo-500/15 text-indigo-200">
                    <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                </div>
                <h1 class="bg-gradient-to-r from-indigo-300 to-purple-300 bg-clip-text text-2xl font-bold text-transparent">媒体测试工具</h1>
                <p class="mt-2 text-sm text-gray-400">请输入用户名和密码后继续。</p>
            </div>
            <div>
                <label class="mb-1.5 block text-xs font-medium text-gray-400" for="username">用户名</label>
                <input id="username" class="glass-input text-sm" autocomplete="username" placeholder="admin">
            </div>
            <div>
                <label class="mb-1.5 block text-xs font-medium text-gray-400" for="password">密码</label>
                <input id="password" type="password" class="glass-input text-sm" autocomplete="current-password" placeholder="admin">
            </div>
            <p id="message" class="hidden rounded-lg border border-red-400/20 bg-red-950/30 px-3 py-2 text-sm text-red-100"></p>
            <button id="loginBtn" type="submit" class="w-full rounded-xl bg-indigo-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-60">登录</button>
            <p class="text-center text-xs text-gray-500">默认账号：admin / admin，登录后可在右上角系统配置中修改。</p>
        </form>
    </main>

    <script>
        (function () {
            const form = document.getElementById('loginForm');
            const username = document.getElementById('username');
            const password = document.getElementById('password');
            const button = document.getElementById('loginBtn');
            const message = document.getElementById('message');

            function showMessage(text) {
                message.textContent = text || '';
                message.classList.toggle('hidden', !text);
            }

            async function checkAlreadyLogin() {
                try {
                    const res = await fetch('/api/auth/status');
                    const data = await res.json();
                    if (data.username) username.value = data.username;
                    if (res.ok && data.authenticated) window.location.href = '/';
                } catch (_) {
                    // Keep the login form available when status probing fails.
                }
            }

            async function submitLogin(event) {
                event.preventDefault();
                button.disabled = true;
                showMessage('');
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: String(username.value || '').trim(),
                            password: String(password.value || ''),
                        }),
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.message || '登录失败');
                    window.location.href = '/';
                } catch (error) {
                    showMessage(error.message || '登录失败');
                } finally {
                    button.disabled = false;
                }
            }

            form.addEventListener('submit', submitLogin);
            checkAlreadyLogin();
        })();
    </script>
</body>
</html>
